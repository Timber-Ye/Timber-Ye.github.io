<style>
  @font-face {
    font-family: "IBM Plex Sans";
    src: url("assets/fonts/ibmplexsans-regular.woff2") format("woff2");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  @font-face {
    font-family: "IBM Plex Sans";
    src: url("assets/fonts/ibmplexsans-italic.woff2") format("woff2");
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }

  @font-face {
    font-family: "IBM Plex Sans";
    src: url("assets/fonts/ibmplexsans-medium.woff2") format("woff2");
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }

  @font-face {
    font-family: "IBM Plex Sans";
    src: url("assets/fonts/ibmplexsans-mediumitalic.woff2") format("woff2");
    font-weight: 500;
    font-style: italic;
    font-display: swap;
  }

  @font-face {
    font-family: "IBM Plex Sans";
    src: url("assets/fonts/ibmplexsans-semibold.woff2") format("woff2");
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }

  @font-face {
    font-family: "IBM Plex Sans";
    src: url("assets/fonts/ibmplexsans-semibolditalic.woff2") format("woff2");
    font-weight: 600;
    font-style: italic;
    font-display: swap;
  }

  @font-face {
    font-family: "IBM Plex Sans";
    src: url("assets/fonts/ibmplexsans-bold.woff2") format("woff2");
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  @font-face {
    font-family: "IBM Plex Sans";
    src: url("assets/fonts/ibmplexsans-bolditalic.woff2") format("woff2");
    font-weight: 700;
    font-style: italic;
    font-display: swap;
  }

  /*
   * Webpage HTML Export uses a different DOM from Obsidian's preview pane.
   * Keep the exported Home page aligned with the enabled Obsidian snippets.
   */
  body {
    --homepage-document-width: 84em;
    --homepage-banner-icon-lift: -56px;
    --homepage-page-icon-lift: -72px;
    --homepage-portrait-top-offset: 2.55rem;
    --file-line-width: var(--homepage-document-width);
  }

  :root body {
    --line-width: var(--homepage-document-width) !important;
    --line-width-adaptive: var(--homepage-document-width) !important;
    --file-line-width: var(--homepage-document-width) !important;
  }

  body.homepage,
  .obsidian-document {
    --homepage-accent: #5c7bf5;
    --homepage-warm: #f79646;
    font-family: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #center-content,
  .obsidian-document,
  .markdown-preview-sizer {
    max-width: var(--homepage-document-width) !important;
    font-family: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  /* The public homepage is a single-column site: remove exported panel shells too. */
  #left-content,
  #right-content,
  #left-sidebar,
  #right-sidebar {
    display: none !important;
    width: 0 !important;
    min-width: 0 !important;
    max-width: 0 !important;
    flex: 0 0 0 !important;
  }

  #main-horizontal,
  #center-content {
    width: 100%;
  }

  #center-content {
    flex: 1 1 100% !important;
    max-width: 100% !important;
    margin-inline: auto;
  }

  body #center-content > .obsidian-document {
    width: min(100%, var(--homepage-document-width)) !important;
    max-width: var(--homepage-document-width) !important;
    padding-inline: clamp(1rem, 3vw, 2rem) !important;
  }

  body #center-content > .obsidian-document > .markdown-preview-sizer {
    width: 100% !important;
    max-width: var(--homepage-document-width) !important;
    flex-basis: auto !important;
    min-height: 0 !important;
    padding-bottom: 0 !important;
  }

  body #center-content .markdown-pusher,
  body #center-content .markdown-preview-pusher {
    display: none !important;
  }

  .obsidian-banner-wrapper.with-banner {
    margin-bottom: calc(var(--file-margins) + var(--homepage-banner-icon-lift) * -1);
  }

  .banner-header.with-banner.v-above,
  .banner-header.with-banner.v-edge {
    position: relative;
    z-index: 2;
    margin-top: var(--homepage-banner-icon-lift);
    margin-bottom: calc(var(--homepage-banner-icon-lift) * -1 + 0.35rem);
  }

  .banner-header .banner-icon {
    background: color-mix(in srgb, var(--background-primary) 72%, transparent);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    backdrop-filter: blur(8px);
  }

  #webpage-icon,
  .page-title > #webpage-icon {
    position: relative;
    z-index: 3;
    display: block;
    width: fit-content;
    transform: translateY(var(--homepage-page-icon-lift));
    margin-bottom: calc(var(--homepage-page-icon-lift) + 1.35rem);
  }

  #webpage-icon img {
    filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.18));
  }

  .obsidian-document h1,
  .markdown-preview-sizer h1 {
    margin-top: 0.35em;
    margin-bottom: 0.2em;
    font-size: 2.45rem;
    line-height: 1.05;
    font-weight: 760;
  }

  /* Cupertino draws a rule on .inline-title; let the header own the only rule. */
  .obsidian-document .header,
  .markdown-preview-sizer > .header {
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border: 0 !important;
    border-bottom: 1px solid var(--background-modifier-border) !important;
    box-shadow: none !important;
  }

  .obsidian-document .page-title,
  .obsidian-document .inline-title,
  .markdown-preview-sizer .page-title,
  .markdown-preview-sizer .inline-title {
    margin-bottom: 0 !important;
    padding-bottom: 0 !important;
    border: 0 !important;
    box-shadow: none !important;
  }

  .obsidian-document .header .data-bar:empty,
  .markdown-preview-sizer > .header .data-bar:empty {
    display: none !important;
  }

  .obsidian-document h1 + div,
  .obsidian-document h1 + .block-language-col,
  .markdown-preview-sizer h1 + div,
  .markdown-preview-sizer h1 + .block-language-col {
    margin-top: 0.65rem;
  }

  .obsidian-document h2,
  .markdown-preview-sizer h2 {
    margin-top: 2.3rem;
    padding-top: 1.2rem;
    border-top: 1px solid var(--background-modifier-border);
    font-size: 1.32rem;
    letter-spacing: 0;
  }

  .obsidian-document h3,
  .markdown-preview-sizer h3 {
    margin-top: 0.35rem;
    margin-bottom: 0.45rem;
    font-size: 1.12rem;
    color: var(--text-normal);
  }

  .obsidian-document h4,
  .markdown-preview-sizer h4 {
    margin-top: 0.25rem;
    margin-bottom: 0.65rem;
    font-size: 1rem;
    line-height: 1.35;
  }

  .obsidian-document hr,
  .markdown-preview-sizer hr {
    margin: 0 0 0.3rem;
    border-color: transparent;
  }

  .obsidian-document p,
  .obsidian-document li,
  .markdown-preview-sizer p,
  .markdown-preview-sizer li {
    font-size: 0.95rem;
    line-height: 1.72;
  }

  .obsidian-document p,
  .markdown-preview-sizer p {
    text-align: justify;
    text-justify: inter-word;
  }

  .obsidian-document .columnParent:has(img[src*="Portrait"], img[alt*="Portrait"]),
  .markdown-preview-sizer .columnParent:has(img[src*="Portrait"], img[alt*="Portrait"]) {
    align-items: flex-start;
    margin-bottom: 0;
  }

  .obsidian-document .block-language-col:has(img[src*="Portrait"], img[alt*="Portrait"]),
  .markdown-preview-sizer .block-language-col:has(img[src*="Portrait"], img[alt*="Portrait"]),
  .obsidian-document .el-pre:has(img[src*="Portrait"], img[alt*="Portrait"]),
  .markdown-preview-sizer .el-pre:has(img[src*="Portrait"], img[alt*="Portrait"]) {
    margin-bottom: 0 !important;
  }

  .obsidian-document .columnChild:has(img[src*="Portrait"], img[alt*="Portrait"]),
  .markdown-preview-sizer .columnChild:has(img[src*="Portrait"], img[alt*="Portrait"]) {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: var(--homepage-portrait-top-offset);
    text-align: center;
  }

  .obsidian-document .columnChild:has(img[src*="Portrait"], img[alt*="Portrait"]) .block-language-col-md,
  .markdown-preview-sizer .columnChild:has(img[src*="Portrait"], img[alt*="Portrait"]) .block-language-col-md {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .obsidian-document .columnChild:has(img[src*="Portrait"], img[alt*="Portrait"]) p,
  .markdown-preview-sizer .columnChild:has(img[src*="Portrait"], img[alt*="Portrait"]) p {
    width: 240px;
    max-width: 100%;
    margin-bottom: 0;
    text-align: center;
  }

  .obsidian-document .columnChild:has(img[src*="Portrait"], img[alt*="Portrait"]) .internal-embed,
  .markdown-preview-sizer .columnChild:has(img[src*="Portrait"], img[alt*="Portrait"]) .internal-embed {
    display: block;
    width: 240px;
    max-width: 100%;
    margin-right: auto;
    margin-left: auto;
  }

  .obsidian-document .columnChild:has(img[src*="Portrait"], img[alt*="Portrait"]) img,
  .markdown-preview-sizer .columnChild:has(img[src*="Portrait"], img[alt*="Portrait"]) img {
    display: block;
    margin-right: auto;
    margin-left: auto;
  }

  .obsidian-document ul,
  .markdown-preview-sizer ul {
    padding-inline-start: 1.35em;
  }

  .obsidian-document li + li,
  .markdown-preview-sizer li + li {
    margin-top: 0.25rem;
  }

  .obsidian-document a,
  .markdown-preview-sizer a {
    font-weight: 520;
  }

  .obsidian-document .homepage-contact,
  .markdown-preview-sizer .homepage-contact {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem 0.55rem;
    align-items: center;
    margin-top: 0.8rem;
  }

  .obsidian-document .homepage-contact a,
  .markdown-preview-sizer .homepage-contact a {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.18rem 0.55rem;
    border: 1px solid color-mix(in srgb, var(--homepage-accent) 16%, var(--background-modifier-border));
    border-radius: 999px;
    color: color-mix(in srgb, var(--text-normal) 86%, var(--homepage-accent));
    background: color-mix(in srgb, var(--homepage-accent) 6%, transparent);
    font-size: 0.9rem;
    font-weight: 600;
    line-height: 1.45;
    text-decoration: none !important;
    white-space: nowrap;
    transition: background-color 150ms ease, border-color 150ms ease, transform 150ms ease;
  }

  .obsidian-document .homepage-contact a:hover,
  .markdown-preview-sizer .homepage-contact a:hover {
    transform: translateY(-1px);
    border-color: color-mix(in srgb, var(--homepage-accent) 30%, var(--background-modifier-border));
    background: color-mix(in srgb, var(--homepage-accent) 11%, transparent);
  }

  .obsidian-document .homepage-contact-icon,
  .markdown-preview-sizer .homepage-contact-icon {
    font-size: 0.95rem;
    line-height: 1;
  }

  .obsidian-document .columnParent:has(.pub-venue),
  .markdown-preview-sizer .columnParent:has(.pub-venue) {
    align-items: center;
    gap: 1.25rem;
    margin: 1.05rem 0 1.2rem;
  }

  .obsidian-document .columnParent:has(.pub-venue) .columnChild:first-child,
  .markdown-preview-sizer .columnParent:has(.pub-venue) .columnChild:first-child {
    flex: 0 0 360px;
  }

  .obsidian-document .columnParent:has(.pub-venue) img,
  .markdown-preview-sizer .columnParent:has(.pub-venue) img {
    display: block;
    max-width: 360px;
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    margin: 0 auto;
    border-radius: 7px;
    border: 1px solid color-mix(in srgb, var(--homepage-accent) 22%, var(--background-modifier-border));
    pointer-events: none;
  }

  .obsidian-document .pub-venue,
  .markdown-preview-sizer .pub-venue {
    display: inline-flex;
    align-items: center;
    width: fit-content;
    margin-bottom: 0.35rem;
    color: var(--homepage-warm);
    font-size: 0.9rem;
    font-weight: 720;
  }

  .obsidian-document .columnParent:has(.pub-venue) h3,
  .markdown-preview-sizer .columnParent:has(.pub-venue) h3 {
    position: absolute;
    overflow: hidden;
    clip: rect(0 0 0 0);
    margin: 0;
    width: 1px;
    height: 1px;
    white-space: nowrap;
  }

  .obsidian-document .pub-title-full,
  .markdown-preview-sizer .pub-title-full {
    display: block;
    margin-bottom: 0.45rem;
    color: var(--text-normal);
    font-size: 1.2rem;
    font-weight: 700;
    line-height: 1.35;
  }

  .obsidian-document .columnParent:has(.pub-venue) p,
  .markdown-preview-sizer .columnParent:has(.pub-venue) p {
    margin: 0.3rem 0;
    text-align: left;
  }

  .obsidian-document .pub-links,
  .markdown-preview-sizer .pub-links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem 0.85rem;
    margin-top: 0.35rem;
    font-size: 0.92rem;
  }

  .obsidian-document .pub-links .iconize-icon-in-link,
  .markdown-preview-sizer .pub-links .iconize-icon-in-link {
    display: none;
  }

  .obsidian-document .internal-embed img,
  .obsidian-document img,
  .markdown-preview-sizer .internal-embed img,
  .markdown-preview-sizer img {
    border-radius: 8px;
  }

  .obsidian-document .media-embed.image-embed,
  .obsidian-document .media-embed.image-embed img,
  .markdown-preview-sizer .media-embed.image-embed,
  .markdown-preview-sizer .media-embed.image-embed img {
    cursor: default;
  }

  .obsidian-document .internal-embed img[alt*="Portrait"],
  .obsidian-document img[src*="Portrait"],
  .markdown-preview-sizer .internal-embed img[alt*="Portrait"],
  .markdown-preview-sizer img[src*="Portrait"] {
    max-width: 240px;
    padding: 0.28rem;
    border-radius: 12px;
    border: 1px solid color-mix(in srgb, var(--homepage-accent) 24%, var(--background-modifier-border));
    background: color-mix(in srgb, var(--background-primary) 88%, var(--homepage-accent));
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
    pointer-events: none;
  }

  .obsidian-document font[color="#f79646"],
  .markdown-preview-sizer font[color="#f79646"] {
    color: var(--homepage-warm);
    font-weight: 720;
  }

  .obsidian-document strong,
  .markdown-preview-sizer strong {
    font-weight: 720;
  }

  .obsidian-document .heading-collapse-indicator,
  .markdown-preview-sizer .heading-collapse-indicator {
    display: none !important;
  }

  .obsidian-document .news-date,
  .markdown-preview-sizer .news-date {
    display: inline-flex;
    align-items: center;
    margin-right: 0.55rem;
    padding: 0.08rem 0.42rem;
    border: 1px solid color-mix(in srgb, var(--homepage-warm) 28%, var(--background-modifier-border));
    border-radius: 999px;
    color: var(--homepage-warm);
    background: color-mix(in srgb, var(--homepage-warm) 9%, transparent);
    font-size: 0.78rem;
    font-weight: 700;
    line-height: 1.55;
    white-space: nowrap;
  }

  .obsidian-document ul:has(.news-date),
  .markdown-preview-sizer ul:has(.news-date) {
    position: relative;
    margin-top: 0.9rem;
    padding-inline-start: 0.15rem;
    list-style: none;
  }

  .obsidian-document ul:has(.news-date)::before,
  .markdown-preview-sizer ul:has(.news-date)::before {
    display: none;
  }

  .obsidian-document li:has(.news-date),
  .markdown-preview-sizer li:has(.news-date) {
    position: relative;
    margin-top: 0;
    padding: 0.24rem 0 0.62rem 1.2rem;
    border-left: 1px solid color-mix(in srgb, var(--homepage-warm) 22%, var(--background-modifier-border));
    list-style: none;
  }

  .obsidian-document li:has(.news-date)::before,
  .markdown-preview-sizer li:has(.news-date)::before {
    content: "";
    position: absolute;
    top: 0.72rem;
    left: -0.255rem;
    width: 0.42rem;
    height: 0.42rem;
    border-radius: 999px;
    background: var(--homepage-warm);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--homepage-warm) 14%, var(--background-primary));
  }

  .obsidian-document li:has(.news-date) .list-bullet,
  .markdown-preview-sizer li:has(.news-date) .list-bullet {
    display: none;
  }

  .obsidian-document .pub-links a,
  .markdown-preview-sizer .pub-links a {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.16rem 0.52rem;
    border: 1px solid color-mix(in srgb, var(--homepage-accent) 18%, var(--background-modifier-border));
    border-radius: 999px;
    color: color-mix(in srgb, var(--homepage-accent) 86%, var(--text-normal));
    background: color-mix(in srgb, var(--homepage-accent) 8%, transparent);
    font-size: 0.86rem;
    font-weight: 650;
    line-height: 1.45;
    text-decoration: none !important;
    transition: background-color 150ms ease, border-color 150ms ease, transform 150ms ease;
  }

  .obsidian-document .pub-links a:hover,
  .markdown-preview-sizer .pub-links a:hover {
    transform: translateY(-1px);
    border-color: color-mix(in srgb, var(--homepage-accent) 34%, var(--background-modifier-border));
    background: color-mix(in srgb, var(--homepage-accent) 13%, transparent);
  }

  .obsidian-document h2,
  .markdown-preview-sizer h2 {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    margin-top: 2.6rem;
    padding-top: 1.25rem;
    border-top: 1px solid color-mix(in srgb, var(--homepage-accent) 18%, var(--background-modifier-border));
    font-size: 1.28rem;
    font-weight: 760;
  }

  .obsidian-document h2::before,
  .markdown-preview-sizer h2::before {
    content: "";
    display: inline-block;
    width: 0.32rem;
    height: 1.35rem;
    flex: 0 0 auto;
    border-radius: 999px;
    background: linear-gradient(180deg, var(--homepage-accent), var(--homepage-warm));
  }

  .obsidian-document .columnParent:has(.pub-venue),
  .markdown-preview-sizer .columnParent:has(.pub-venue) {
    gap: 1.15rem;
    margin: 1.15rem 0 1.35rem;
    padding: 0.95rem;
    border: 1px solid color-mix(in srgb, var(--homepage-accent) 17%, var(--background-modifier-border));
    border-radius: 10px;
    background: color-mix(in srgb, var(--background-primary) 96%, var(--homepage-accent));
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
  }

  .obsidian-document .columnParent:has(.pub-venue):hover,
  .markdown-preview-sizer .columnParent:has(.pub-venue):hover {
    transform: translateY(-1px);
    border-color: color-mix(in srgb, var(--homepage-accent) 30%, var(--background-modifier-border));
    box-shadow: 0 14px 34px rgba(0, 0, 0, 0.1);
  }

  .obsidian-document .columnParent:has(.pub-venue) .columnChild:first-child,
  .markdown-preview-sizer .columnParent:has(.pub-venue) .columnChild:first-child {
    flex: 0 0 330px;
  }

  .obsidian-document .columnParent:has(.pub-venue) img,
  .markdown-preview-sizer .columnParent:has(.pub-venue) img {
    max-width: 330px;
    padding: 0.35rem;
    border-radius: 10px;
    border-color: color-mix(in srgb, var(--homepage-accent) 20%, var(--background-modifier-border));
    background: color-mix(in srgb, var(--background-primary) 82%, var(--homepage-accent));
    box-shadow: inset 0 0 0 1px color-mix(in srgb, #ffffff 20%, transparent);
  }

  #right-sidebar {
    opacity: 0.58;
    filter: saturate(0.72);
    transition: opacity 160ms ease, filter 160ms ease;
  }

  #right-sidebar:hover,
  #right-sidebar:focus-within {
    opacity: 1;
    filter: none;
  }

  #right-sidebar .leaf-content,
  #right-sidebar .sidebar-topbar {
    background-color: color-mix(in srgb, var(--background-secondary) 86%, transparent);
    backdrop-filter: blur(10px);
  }

  #right-sidebar .feature-title,
  #right-sidebar .tree-item-inner {
    font-size: 0.82rem;
  }

  .obsidian-document .last-update,
  .markdown-preview-sizer .last-update {
    display: inline-block;
    color: var(--text-muted);
    font-size: 0.82rem;
    letter-spacing: 0;
    opacity: 0.72;
  }

  .obsidian-document a,
  .markdown-preview-sizer a {
    text-decoration-thickness: 0.08em;
    text-underline-offset: 0.16em;
    transition: color 150ms ease, text-decoration-color 150ms ease;
  }

  .obsidian-document a:hover,
  .markdown-preview-sizer a:hover {
    color: var(--homepage-accent);
    text-decoration-color: color-mix(in srgb, var(--homepage-accent) 56%, transparent);
  }

  .obsidian-document .portrait-caption,
  .markdown-preview-sizer .portrait-caption {
    display: inline-block;
    margin-top: 0.25rem;
    color: var(--text-muted);
    font-size: 0.88rem;
    line-height: 1.45;
  }

  .obsidian-document .portrait-caption strong,
  .markdown-preview-sizer .portrait-caption strong {
    color: var(--text-normal);
    font-size: 0.94rem;
  }

  .obsidian-document .pub-authors,
  .markdown-preview-sizer .pub-authors {
    display: block;
    margin-top: 0.14rem;
    margin-bottom: 0.24rem;
    color: color-mix(in srgb, var(--text-normal) 74%, var(--text-muted));
    font-size: 0.93rem;
    line-height: 1.55;
  }

  .obsidian-document .pub-authors strong,
  .markdown-preview-sizer .pub-authors strong {
    color: var(--text-normal);
    font-weight: 760;
  }

  .obsidian-document .news-date,
  .markdown-preview-sizer .news-date {
    border-color: rgba(247, 150, 70, var(--news-date-border-alpha, 0.34));
    color: rgba(247, 150, 70, var(--news-date-text-alpha, 1));
    background: rgba(247, 150, 70, var(--news-date-bg-alpha, 0.12));
  }
